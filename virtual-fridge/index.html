<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Virtual Fridge</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Household grocery baseline</p>
          <h1>Kitchen Hub</h1>
          <p class="topbar-subtitle">Glanceable food list, shopping posture, and photo reference for the week.</p>
        </div>
        <div class="sync-card" aria-label="Inventory sync status">
          <span>Last grocery pass</span>
          <strong>May 17</strong>
        </div>
      </header>

      <section class="control-strip" aria-label="Inventory filters">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="milk, pasta, baby..." autocomplete="off">
        </label>
        <div class="segmented" role="tablist" aria-label="Inventory views">
          <button class="segment active" type="button" data-tab="home">Home</button>
          <button class="segment" type="button" data-tab="fridge">Fridge</button>
          <button class="segment" type="button" data-tab="freezer">Freezer</button>
          <button class="segment" type="button" data-tab="pantry">Pantry</button>
          <button class="segment" type="button" data-tab="photos">Photos</button>
        </div>
      </section>

      <section class="dashboard">
        <aside class="status-panel" aria-label="Current shopping posture">
          <button class="metric status-filter" type="button" data-status-filter="use-first" aria-pressed="false">
            <span class="metric-label">Use First</span>
            <strong id="useFirstCount">0</strong>
          </button>
          <button class="metric status-filter" type="button" data-status-filter="overstock" aria-pressed="false">
            <span class="metric-label">Do Not Buy</span>
            <strong id="overstockCount">0</strong>
          </button>
          <button class="metric status-filter" type="button" data-status-filter="gap" aria-pressed="false">
            <span class="metric-label">Gaps</span>
            <strong id="gapCount">0</strong>
          </button>
          <div class="legend" aria-label="Inventory color key">
            <span><i class="legend-dot use-first"></i>Use first</span>
            <span><i class="legend-dot overstock"></i>Do not buy</span>
            <span><i class="legend-dot gap"></i>Gap</span>
          </div>
          <div class="quick-list">
            <h2>Next Trip Bias</h2>
            <ul id="tripBias"></ul>
          </div>
        </aside>

        <section class="fridge-display" aria-live="polite">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="zoneKicker">Current zone</p>
              <h2 id="zoneTitle">Home</h2>
            </div>
            <p id="zoneSummary"></p>
          </div>

          <div id="inventoryView" class="inventory-view"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
